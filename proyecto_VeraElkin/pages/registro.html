<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>registro de espeAngola</title>
    <link rel="icon" href="../img/Login/Registro.ico" type="image/x-icon">  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" >
</head>

 <section style="text-align: center; font-family: Arial, Helvetica, sans-serif; ">
       <figure>
        <img src="../img/espe.png" alt="logo Espe" style="width: 300px; height: auto;">
        <figcaption>Universidad de las FFAA ESPE</figcaption>
    </figure>
</section>

<body style="background-color: #f4f4f4;" text-align="center">
    <header style="text-align:center">
        <h1>Registro de usuario</h1>
    </header>

    <nav style="background: #0a631e;">
            <a href="../index.html" style="color: white; text-decoration: none;" >Salir</a>
    </nav>


    <section class ="registrate" style="text-align: center; font-family: Arial, Helvetica, sans-serif; ">
        <form action="../Principal/Angola.html" method="post">
        <fieldset>
            <legend>Registro</legend>
            
                <label for="Nombres">Nombres: <i class="fa-solid fa-user"></i></label>
                <input type="text" id="Nombres" name="Nombres" maxlength="16" minlength="8" required>
                <br><br>

                <label for="Apellido">Apellido: <i class="fa-solid fa-user"></i></label>
                <input type="text" id="Apellido" name="Apellido" maxlength="16" minlength="8" required>

                <br><br>
                <label for="Cedula">Cédula: <i class="fa-solid fa-id-card"></i></label>
                <input type="text" id="Cedula" name="Cedula" maxlength="10" minlength="10" required
                pattern="^\d{10}$" title="La cédula debe contener exactamente 10 dígitos numéricos.">
                <br><br>

                <label for="Fecha de nacimiento">Fecha de nacimiento: <i class="fa-solid fa-birthday-cake"></i></label>
                <input type="date" id="Fecha de nacimiento" name="Fecha de nacimiento" required>

                <br><br>
                <label for="Genero"> Género: <i class="fa-solid fa-venus-mars"></i></label>
                <select id="Genero" name="Genero" required>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Otro">Otro</option>
                </select>

                <br><br>
                <label for="Correo">Correo electrónico: <i class="fa-solid fa-envelope"></i></label>
                <input type="email" id="Correo" name="Correo" required>

                <br><br>


                <br><br>

        </fieldset>
        <fieldset>
                    <legend>Contraseña</legend>
                    <label for="password">Contraseña: <i class="fa-solid fa-key"></i></label>
                <input type="password" id="password" name="password" required minlength="8" maxlength="16"><br><br>

                <label for="password">Confirmar Contraseña: <i class="fa-solid fa-key"></i></label>
                <input type="password" id="password" name="password" required minlength="8" maxlength="16"><br><br>

                <label for="usuario">Usuario: <i class="fa-solid fa-user"></i></label>
                <input type="text" id="usuario" name="usuario" maxlength="16" minlength="8" >
                </fieldset>
                <input type="submit" value="Registrarse">
         </form>
    </section>

     <footer style="background-color: rgb(28, 126, 41); text-align: center;">
        <p>Elking &copy; 2026 EspeAngola. Todos los derechos reservados.</p>
    </footer>
</body>
