<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Espe estudiantes</title>
    <link rel="icon" href="img/Login/Universidad.ico" type="image/x-icon">  
    <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" >
</head>

<body style="background-color: lightgray; text-align: center; font-family: 'Arial', sans-serif; ">

    <header>
        <h1>Bienvenidos a la ESPE</h1>
    </header>

    <figure>
        <img src="img/espe.png" alt="Logo Espe" width="200" height="100" style="align-content: center;">
        <figcaption style = "background-color: rgb(11, 114, 49); color: #ffffff;">Universidad de las Fuerzas Armadas Espe</figcaption>
    </figure>

    
    <section class = "Fondo " 
    style="background-image: url('img/Login/FondoLogin.png'); ">
    <section class ="login">
        <form method="post" action="Principal/Angola.html">
            <fieldset>
    <legend style="text-align: center; font-size: 20px; font-weight: bold">Login</legend>

    <label for="usuario">Usuario</label>
     <i class="fa-solid fa-user"></i> <!-- Usuario -->
    <input 
        type="text" 
        id="usuario" 
        name="Usuario" 
        maxlength="16"
        minlength="8"
        pattern="^[a-zA-Z0-9]{8,16}$"
        title="El usuario debe tener entre 8 y 16 caracteres, solo letras y números"
        required>
    
    <br><br>

    <label for="password">Contraseña</label>
    <i class="fa-solid fa-lock"></i> <!-- Contraseña -->
    <input 
        type="password" 
        id="password" 
        name="Contraseña" 
        maxlength="20"
        minlength="10"
         pattern="^(?=.*[a-zA-Z])(?=.*[0-9])(?=.*[^a-zA-Z0-9]).{10,20}$"
        title="La contraseña debe tener entre 10 y 20 caracteres, incluir letras, números y al menos un carácter especial"
        required>

    <br><br>

    <button type="submit">Ingresar</button>
</fieldset>
            </section>

<br><br>
     <section style="text-align: center; font-family: Arial, Helvetica, sans-serif; ">
        <fieldset>
        <legend>¿No tienes una cuenta?</legend>
       
        <a href="pages/registro.html" style="display: inline-block; padding: 10px 20px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 5px;">Registrarse</a>
    </fieldset>
    </section>

        </form>

    
    

    
    <footer style = "background-color: rgb(11, 114, 49); color: white; padding: 10px; width: 100%; text-align: center;">
        <p> &copy; 2026  Espe. Todos los derechos reservados</p>
    </footer>

</body>
