<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="Maquillaje/login.css">
    <title>Espe estudiantes</title>
    <link rel="icon" href="img/Login/Universidad.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body >

    <header class="header">
        <h1>Bienvenidos a la ESPE</h1>
    </header>

    <figure class="logo-container">
        <img src="img/espe.png" alt="Logo Espe">
        <figcaption>Universidad de las Fuerzas Armadas Espe</figcaption>
    </figure>

    <section class="fondo">

        <section class="login-card">
            <form method="post" action="Principal/Angola.html">
                <fieldset>
                    <legend>Login</legend>

                    <label for="usuario">Usuario</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="usuario" name="Usuario" maxlength="16" minlength="8"
                            pattern="^[a-zA-Z0-9]{8,16}$"
                            title="El usuario debe tener entre 8 y 16 caracteres, solo letras y números" required>

                    </div>

                    <label for="password">Contraseña</label>
                    <div class="input-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="Contraseña" maxlength="20" minlength="10"
                            pattern="^(?=.*[a-zA-Z])(?=.*[0-9])(?=.*[^a-zA-Z0-9]).{10,20}$"
                            title="La contraseña debe tener entre 10 y 20 caracteres, incluir letras, números y al menos un carácter especial"
                            required>

                    </div>

                    <button type="submit">Ingresar</button>
                </fieldset>
            </form>
        </section>

    </section>

    <section class="registro-box">
        <fieldset>
            <legend>¿No tienes una cuenta?</legend>
            <a href="pages/registro.html">Registrarse</a>
        </fieldset>
    </section>

    <footer>
        <p>© 2026 Espe. Todos los derechos reservados</p>
    </footer>

</body>
